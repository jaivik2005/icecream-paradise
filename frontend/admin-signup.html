<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍦 Ice Cream Paradise - Admin Signup</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .auth-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--dark);
        }
        .message-div {
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        .error-msg {
            color: var(--danger);
        }
        .success-msg {
            color: var(--success);
        }
        .auth-links {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .auth-links a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🍦 Ice Cream Paradise</h1>
            <p class="tagline">Admin Registration</p>
        </div>
        <nav class="nav-links">
            <a href="index.html">📋 Customer Menu</a>
        </nav>
    </header>

    <div class="auth-container">
        <h2>Admin Signup</h2>
        <div id="status-message" class="message-div"></div>
        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="Enter Name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="admin@icecream.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Min 6 characters" minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" required placeholder="Re-enter password" minlength="6">
            </div>
            <button type="submit" class="submit-btn" style="width: 100%; margin-top: 10px;">Sign Up</button>
        </form>
        <div class="auth-links">
            <p>Already have an account? <a href="admin-login.html">Login</a></p>
        </div>
    </div>

    <script>
        const API_URL = '';

        // Check if already logged in
        if (localStorage.getItem('adminToken')) {
            window.location.replace('admin.html');
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const statusDiv = document.getElementById('status-message');

            statusDiv.className = 'message-div error-msg';

            if (password !== confirmPassword) {
                statusDiv.textContent = "Passwords do not match!";
                statusDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    statusDiv.textContent = data.error || 'Registration failed';
                    statusDiv.style.display = 'block';
                } else {
                    // Success
                    statusDiv.className = 'message-div success-msg';
                    statusDiv.textContent = 'Account created! Redirecting to login...';
                    statusDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'admin-login.html';
                    }, 2000);
                }
            } catch (error) {
                console.error('Signup error:', error);
                statusDiv.textContent = 'Server error. Is the backend running?';
                statusDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
